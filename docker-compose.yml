services:
  vllm-qwen:
    image: vllm/vllm-openai:v0.6.3
    container_name: vllm-qwen
    ports:
      - "8000:8000"
    volumes:
      - ./model-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - "--model"
      - "Qwen/Qwen2.5-1.5B-Instruct"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--max-model-len"
      - "2048"
      - "--max-num-seqs"
      - "16"
      - "--dtype"
      - "half"
    profiles:
      - qwen

  vllm-qwen-small:
    image: vllm/vllm-openai:v0.6.3
    container_name: vllm-qwen-small
    ports:
      - "8001:8000"
    volumes:
      - ./model-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - "--model"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--max-model-len"
      - "2048"
      - "--max-num-seqs"
      - "16"
      - "--dtype"
      - "half"
    profiles:
      - qwen-small

  nginx:
    image: nginx:latest
    container_name: nginx-router
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    profiles:
      - qwen
      - qwen-small

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # default login: admin / admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring