name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 benchmark/ --max-line-length=100 --ignore=E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest aiohttp

      - name: Run tests
        run: pytest benchmark/test_benchmark.py -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    # only build/push on actual pushes to main, not on PRs
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-notice:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Deployment notice
        run: |
          echo "Image pushed to ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "In a production cluster, this step would run:"
          echo "kubectl set image deployment/qwen-1-5b-predictor kserve-container=ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Skipped here since this targets a local Kind cluster not reachable from GitHub Actions runners"
