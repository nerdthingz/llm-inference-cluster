events {
    worker_connections 1024;
}

http {
    # split_clients distributes requests by hashing a variable
    # 80% of values map to "qwen", remaining 20% map to "tinyllama"
    split_clients "${remote_addr}${request_id}${msec}" $backend {
        80% qwen;
        20% tinyllama;
    }

    upstream qwen {
        server host.docker.internal:8000;
    }

    upstream tinyllama {
        server host.docker.internal:8001;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Backend-Used $backend;
            add_header X-Backend-Used $backend always;
        }
    }
}